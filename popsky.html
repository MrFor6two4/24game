<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYGAMEFORU</title>
    <style>
        body{
            background: rgb(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;       
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <canvas id="game" width="480" height="640"></canvas>
    <script>
        //code_game **all**
        const canvas = document.getElementById("game");
        const ctx =canvas.getContext('2d');
        let gameState ='start';
        let score=0;
        let lives=3;
        let frame=0;
        let lastTime=0;
        const player={
            x:220,
            y:560,
            w:40,
            h:40,
            speed:5,
            frame:0,
            animatimer:0
        };
        const keys={};
        document.addEventListener('keydown',function(e) {
            keys[e.key]=true;
            if(e.key==='Enter'){
                if(gameState==='start'){
                    score=0;
                    lives=3;
                    frame=0;
                    bullets=[];
                    enemies=[];
                    player.x=220;
                    player.y=560;
                    gameState='playing';
                }
                if(gameState==='gameover'){
                    gameState='start';
                }
            }
        });
        document.addEventListener('keyup',function(e) {
            keys[e.key]=false;
        });
        let bullets=[];
        let shootCooldown=0;
        let enemies=[];
        let spawnTimer=0;
        const imgPlayer=new Image();
                    imgPlayer.src='player.png';
        function shoot(){
            bullets.push({
                x:player.x+player.w/2-3,
                y:player.y,
                w:6,h:14,
                speed:5
            });
        
        }
        function update(dt){
            frame++;
            if(gameState !=='playing') return;
            if(keys['ArrowLeft']&&player.x>0) player.x-=player.speed*dt*60;
            if(keys['ArrowRight']&&player.x+player.w<480) player.x+=player.speed*dt*60;
            if(keys['ArrowUp']&&player.y>0) player.y-=player.speed*dt*60;
            if(keys['ArrowDown']&&player.y+player.h<640) player.y+=player.speed*dt*60;
            player.animatimer+=dt;
            if(player.animatimer>=0.1){
                player.animatimer=0;
                player.frame++;
                if(player.frame>=4) player.frame=0;
            }
            if(keys[' ']&& shootCooldown<=0){
                shoot();
                shootCooldown=0.2;
            }
            if (shootCooldown>0)shootCooldown-=dt;
            bullets.forEach(function(b){b.y-=b.speed*dt*60;});
            bullets=bullets.filter(function(b){return b.y>-20;});
            spawnTimer+=dt;
            if(spawnTimer>=1.3){
                enemies.push({
                    x:Math.random()*440,
                    y:-40,
                    w:38,
                    h:38,
                    speed:2+Math.random()*2
                });
                spawnTimer=0;
            }
            enemies.forEach(function(e){e.y+=e.speed*dt*60;});
            enemies=enemies.filter(function(e){return e.y<680;});
            for(let bi=bullets.length-1; bi>=0; bi--){
                for(let ei=enemies.length-1; ei>=0; ei--){
                    let b =bullets[bi];
                    let e=enemies[ei];
                    if (b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
                        bullets.splice(bi,1);
                        enemies.splice(ei,1);
                        score+=10;
                    }
                }
            }
            for(let ei=enemies.length-1; ei >=0;ei--){
                let e=enemies[ei];
                if(e.x<player.x+player.w&&e.x+e.w>player.x&&
                   e.y<player.y+player.h&&e.y+e.h>player.y){
                    enemies.splice(ei,1);
                    lives--;
                    if(lives<=0){
                        gameState='gameover'
                    }
                }
            }
        }
        function draw(){
                ctx.fillStyle='black';
                ctx.fillRect(0,0,480,640);
                if(gameState==='start'){
                    ctx.fillStyle='white';
                    ctx.font='bold 48px sans-serif';
                    ctx.textAlign='center';
                    ctx.fillText('POPSKY01',240,320);                   
                    ctx.font='22px sans-serif';
                    ctx.fillText('Press Enter to Start',240,390);
                }else if(gameState==='playing'){
                    ctx.drawImage(imgPlayer,player.frame*40,0,40,40,player.x,player.y,player.w,player.h);
                    bullets.forEach(function(b){
                        ctx.fillStyle='yellow';
                        ctx.fillRect(b.x,b.y,b.w,b.h);
                    });
                    enemies.forEach(function(e){
                        ctx.fillStyle='red';
                        ctx.fillRect(e.x,e.y,e.w,e.h);
                    });
                    //hp//
                    ctx.fillStyle='white';
                    ctx.font='20px sans-serif';
                    ctx.textAlign='left';
                    ctx.fillText('score'+score,10,30);
                    ctx.fillText('live'+lives,10,55);
                }else if(gameState=='gameover'){
                    ctx.fillStyle='red';
                    ctx.font='bold 60px sans-serif';
                    ctx.textAlign='center';
                    ctx.fillText('GAME OVER',240,250);
                    ctx.fillStyle='white';
                    ctx.font='22px sans-serif';
                    ctx.fillText('score:'+score,240,300);
                    ctx.fillStyle='white';
                    ctx.font='22px sans-serif';
                    ctx.fillText('Press Enter to Restart',240,370);
                }              
            }      
        function loop(timestamp){
           let dt=(timestamp-lastTime)/1000;
           if (dt>0.1) dt=0.1;
           lastTime=timestamp;
           update(dt);
           draw();
           requestAnimationFrame(loop);

        }
        requestAnimationFrame(loop);

        
    </script>

</body>
</html>
