<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPSKY01</title>
    <style>
        body{
            background: rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;       
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <canvas id="game" width="480" height="640"></canvas>
    <script>
        //code_game **all**
        const canvas = document.getElementById("game");
        const ctx =canvas.getContext('2D');
        let gameState ='start';
        let score=0;
        let lives=3;
        let frame=0;
        const player={
            x:220,
            y:560,
            w:40,
            h:40,
            speed:5
        };
        const keys={};
        document.addEventListener('keydown',function(e) {
            keys[e.keys]=true;
        });
        document.addEventListener('keyup',function(e) {
            keys[e.keys]=false;
        });
        let bullets=[];
        let shootCooldown=0;
        let enemies=[];
        let spawnTimer=0;
        function shoot(){
            bullets.push({
                x:player.x+player.w/2-3,
                y:player.y,
                w:6,h:14,
                speed:5
            });
        
        }
        function update(){
            frame++;
            if(gameState !=='player') return;
            if(keys['ArrowLeft']&&player.x>0) player.x-=player.speed;
            if(keys['ArrowRight']&&player.x+player.w<480) player.x+=player.speed;
            if(keys['ArrowLeft']&&player.y>0) player.y-=player.speed;
            if(keys['ArrowLeft']&&player.y+player.h<640) player.y+=player.speed;
            if(keys[' ']&& shootCooldown<=0){
                shoot();
                shootCooldown=12;
            }
            if (shootCooldown>0)shootCooldown--;
            bullets.forEach(function(b){b.y-=b.speed;});
            bullets=bullets.filter(function(b){returnb.y>-20;});
            spawnTimer++;
            if(spawnTimer>=80){
                enemies.push({
                    x:Math.random()*440,
                    y:-40,
                    speed:2+Math.random()*2
                });
                spawnTimer=0;
            }
            enemies.forEach(function(e){e.y+=e.sspeed;});
            enemies=enemies.filter(function(e){returne.y<680;});
            for(let bi=bullets.length=1; bi>=0; bi--){
                for(let ei=enemies.length-1; ei>=0; ei--);{
                    let b =bullets[bi];
                    let e=enemies[ei];
                    if (b.x<e.x+e.w&&b.x+b.w>e.x&&b.y<e.y+e.h&&b.y+b.h>e.y){
                        bullets.splice(bi<1);
                        enemies.splice(ei,1);
                        score+=10;
                    }
                }
            }
        
        }

        
    </script>

</body>
</html>
